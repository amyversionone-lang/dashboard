<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's Task Board — Neural Interface</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #00d9ff;
  --secondary: #ff006e;
  --accent: #8338ec;
  --dark-bg: #0a0e27;
  --glass: rgba(15, 23, 42, 0.7);
  --border: rgba(0, 217, 255, 0.2);
  --text-primary: #f0f4ff;
  --text-secondary: #a8b3ff;
}

body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f1419 100%);
  background-attachment: fixed;
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(131, 56, 236, 0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}

.container {
  max-width: 1600px;
  margin: 0 auto;
  padding: 40px 20px;
}

header {
  text-align: center;
  margin-bottom: 60px;
  animation: fadeInDown 0.8s ease-out;
}

header h1 {
  font-size: 3.5em;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  font-weight: 800;
  letter-spacing: -2px;
  text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
}

header p {
  font-size: 1.2em;
  color: var(--text-secondary);
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 50px;
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

.stat-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 30px;
  backdrop-filter: blur(10px);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.1), transparent);
  transition: left 0.5s ease;
}

.stat-card:hover {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(0, 217, 255, 0.2), inset 0 0 20px rgba(0, 217, 255, 0.05);
  transform: translateY(-5px);
}

.stat-card:hover::before {
  left: 100%;
}

.stat-number {
  font-size: 3em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 0.9em;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.controls {
  display: flex;
  gap: 15px;
  margin-bottom: 40px;
  animation: fadeInUp 0.8s ease-out 0.4s both;
  flex-wrap: wrap;
}

.input-group {
  display: flex;
  gap: 10px;
  flex: 1;
  min-width: 300px;
}

input, select {
  flex: 1;
  padding: 14px 20px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 1em;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

input::placeholder, select {
  color: var(--text-secondary);
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.2), inset 0 0 10px rgba(0, 217, 255, 0.05);
}

button {
  padding: 14px 32px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none;
  border-radius: 10px;
  color: var(--dark-bg);
  font-weight: 700;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(0, 217, 255, 0.5), 0 10px 25px rgba(0, 0, 0, 0.3);
}

button:active {
  transform: translateY(0);
}

.kanban {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 30px;
  animation: fadeInUp 0.8s ease-out 0.6s both;
}

.column {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 25px;
  min-height: 500px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  position: relative;
}

.column::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
}

.column:nth-child(1) .column-header { color: var(--primary); }
.column:nth-child(2) .column-header { color: #ffb700; }
.column:nth-child(3) .column-header { color: #00ff88; }

.column-header {
  font-weight: 700;
  font-size: 1.1em;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.tasks {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.task {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: grab;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.task::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--primary), var(--secondary));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.task:hover {
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.08);
  transform: translateX(4px);
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.15);
}

.task:hover::before {
  opacity: 1;
}

.task:active {
  cursor: grabbing;
  opacity: 0.7;
}

.task-text {
  color: var(--text-primary);
  font-size: 0.95em;
  margin-bottom: 8px;
  font-weight: 500;
}

.task-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8em;
  color: var(--text-secondary);
}

.task-delete {
  background: none;
  border: none;
  color: var(--secondary);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 1.2em;
  transition: all 0.2s ease;
}

.task-delete:hover {
  color: #ff006e;
  transform: rotate(90deg);
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 768px) {
  header h1 {
    font-size: 2em;
  }
  
  .kanban {
    grid-template-columns: 1fr;
  }
  
  .input-group {
    flex-direction: column;
  }
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: var(--dark-bg);
}

::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--secondary);
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🍑 NEURAL TASK INTERFACE</h1>
    <p>Real-time Quantum Tasking</p>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="stat-backlog">0</div>
      <div class="stat-label">Backlog Queue</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-inprogress">0</div>
      <div class="stat-label">Processing</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-done">0</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>

  <div class="controls">
    <div class="input-group">
      <input type="text" id="new-task-text" placeholder="Enter task...">
      <select id="new-task-category">
        <option value="General">General</option>
        <option value="Learning">Learning</option>
        <option value="Automation">Automation</option>
        <option value="Architecture">Architecture</option>
        <option value="Security">Security</option>
      </select>
      <button onclick="addTask()">ADD TASK</button>
    </div>
  </div>

  <div class="kanban">
    <div class="column">
      <div class="column-header">📦 BACKLOG</div>
      <div class="tasks" id="backlog" ondrop="drop(event,'backlog')" ondragover="allowDrop(event)"></div>
    </div>
    <div class="column">
      <div class="column-header">⚡ PROCESSING</div>
      <div class="tasks" id="inprogress" ondrop="drop(event,'inprogress')" ondragover="allowDrop(event)"></div>
    </div>
    <div class="column">
      <div class="column-header">✅ COMPLETED</div>
      <div class="tasks" id="done" ondrop="drop(event,'done')" ondragover="allowDrop(event)"></div>
    </div>
  </div>
</div>

<script>
let tasks = {}, dragSource = null;

async function init() {
  try {
    const r = await fetch('taskboard.json');
    tasks = await r.json();
  } catch (e) {
    tasks = { backlog: [], inprogress: [], done: [] };
  }
  render();
}

function render() {
  ['backlog', 'inprogress', 'done'].forEach(col => document.getElementById(col).innerHTML = '');
  Object.entries(tasks).forEach(([col, list]) => list.forEach(t => addToUI(col, t)));
  updateStats();
}

function addToUI(col, t) {
  const d = document.getElementById(col), e = document.createElement('div');
  e.className = 'task';
  e.id = 't' + t.id;
  e.draggable = true;
  e.ondragstart = () => { dragSource = { col, id: t.id } };
  e.innerHTML = `<div class="task-text">${t.text}</div><div class="task-meta"><span>${t.category}</span><button class="task-delete" onclick="del(${t.id})">✕</button></div>`;
  d.appendChild(e);
}

function allowDrop(e) { e.preventDefault() }

function drop(e, to) {
  e.preventDefault();
  if (!dragSource) return;
  const { col: from, id: tid } = dragSource;
  if (from === to) return;
  const t = tasks[from].find(x => x.id === tid);
  if (t) {
    tasks[from] = tasks[from].filter(x => x.id !== tid);
    tasks[to].push(t);
    save();
    render();
  }
}

function addTask() {
  const text = document.getElementById('new-task-text').value;
  const cat = document.getElementById('new-task-category').value;
  if (!text.trim()) return;
  tasks.backlog.push({ id: Date.now(), text, category: cat });
  save();
  render();
  document.getElementById('new-task-text').value = '';
}

function del(id) {
  if (!confirm('Delete task?')) return;
  ['backlog', 'inprogress', 'done'].forEach(col => tasks[col] = tasks[col].filter(t => t.id !== id));
  save();
  render();
}

function save() {
  const json = JSON.stringify(tasks, null, 2);
  const blob = new Blob([json]);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'taskboard.json';
  a.click();
}

function updateStats() {
  document.getElementById('stat-backlog').textContent = tasks.backlog?.length || 0;
  document.getElementById('stat-inprogress').textContent = tasks.inprogress?.length || 0;
  document.getElementById('stat-done').textContent = tasks.done?.length || 0;
}

init();
</script>

</body>
</html>
